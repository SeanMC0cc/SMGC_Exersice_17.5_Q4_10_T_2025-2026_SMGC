<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css" />
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Object Oriented Programming</title>
</head>
<body>
    <form>
        <input type="text" id="Dname" placeholder="Name for your dog:">
        <input type="text" id="Dbreed" placeholder="Breed for your dog:">
        <input type="text" id="Dage" placeholder="Age for your dog:">
        <input type="text" id="Downer" placeholder="Owner for your dog:">
        <input type="button" id="Submit" py-click="Submit" value="Submit">
    </form>

    <div id="output"></div>
    <py-script src="main.py"></py-script>
</body>
</html>
